global:
  scrape_interval: 15s

rule_files:
  - alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'processor'
    static_configs:
      - targets: ['processor:8003']
  - job_name: 'trainer'
    static_configs:
      - targets: ['trainer:8001']
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
